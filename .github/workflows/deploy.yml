name: Deploy to Vercel Production

on:
  # Automatischer Deploy: maximal alle 3 Stunden (Minute 17 zur Lastverteilung)
  schedule:
    - cron: '17 */3 * * *'
  # Manueller Sofort-Deploy (Notfall, dringende Fixes)
  workflow_dispatch:

# Parallele Runs verhindern
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Schritt 1: Pruefen ob neue Commits seit letztem Deploy
  check:
    name: Check for changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4

      - name: Compare HEAD with last Vercel deploy
        id: check
        run: |
          # Bei manuellem Trigger: immer deployen
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manueller Trigger — Deploy wird ausgefuehrt"
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Letzte erfolgreich deployte SHA von Vercel holen
          LAST_SHA=$(curl -s -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&limit=1&target=production&state=READY" \
            | jq -r '.deployments[0].meta.githubCommitSha // empty')

          CURRENT_SHA=$(git rev-parse HEAD)

          if [ -n "$LAST_SHA" ] && [ "$LAST_SHA" = "$CURRENT_SHA" ]; then
            echo "Keine neuen Commits seit letztem Deploy ($CURRENT_SHA)"
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          else
            echo "Neue Commits: ${LAST_SHA:-unbekannt} -> $CURRENT_SHA"
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          fi

  # Schritt 2: Tests (parallel zum Deploy, blockiert nicht)
  test:
    name: Lint & Test
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npx eslint --max-warnings 200 || echo "::warning::Lint hat Fehler"

      - name: Unit Tests (Vitest)
        run: npm run test || echo "::warning::Tests fehlgeschlagen — Deploy laeuft trotzdem"

  # Schritt 3: Build & Deploy (nur bei neuen Commits oder manuellem Trigger)
  deploy:
    name: Build & Deploy
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Deployment Summary
        run: |
          echo "## Deployment erfolgreich" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://nachbar-io.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "- **Preview:** ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
