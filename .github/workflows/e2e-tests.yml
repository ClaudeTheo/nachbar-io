name: E2E Multi-Agent Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Manueller Trigger
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  E2E_CLEANUP: "true"

jobs:
  e2e-smoke:
    name: Smoke Tests (S7)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          RESIDENT_HASH_SECRET: ci-test-secret-not-real

      - name: Run Smoke Tests
        run: npx playwright test --config=tests/e2e/playwright.config.ts --project=smoke

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  e2e-multi-agent:
    name: Multi-Agent Tests (S1-S6)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: e2e-smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          RESIDENT_HASH_SECRET: ci-test-secret-not-real

      - name: Run Multi-Agent Tests
        run: npx playwright test --config=tests/e2e/playwright.config.ts --project=multi-agent --project=senior-terminal

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multi-agent-test-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: test-results/junit.xml
          retention-days: 14
