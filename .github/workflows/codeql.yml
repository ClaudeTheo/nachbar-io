# CodeQL — Statische Sicherheitsanalyse (SAST)
# GitHub-native, kostenlos, zero externe Tools
# Laeuft woechentlich + bei Push auf master

name: CodeQL Security Analysis

on:
  schedule:
    - cron: '23 5 * * 1'  # Montag 05:23 UTC (07:23 MESZ)
  push:
    branches: [master]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze TypeScript/JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Default-Queries + Security-erweiterte Queries
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
