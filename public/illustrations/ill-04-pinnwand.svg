  <line x1="60" y1="20" x2="60" y2="185" stroke="#2D3142" stroke-width="0.3" opacity="0.06"/>
  <line x1="340" y1="20" x2="340" y2="185" stroke="#2D3142" stroke-width="0.3" opacity="0.06"/>
  <line x1="380" y1="20" x2="380" y2="185" stroke="#2D3142" stroke-width="0.3" opacity="0.06"/>

  <!-- Pinnwand-Rahmen (Holz-Textur) -->
