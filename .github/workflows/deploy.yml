name: Deploy to Vercel Production

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.vscode/**'
  # Manueller Trigger fuer Notfall-Deploys
  workflow_dispatch:

# Bei schnellen Commits: nur den letzten deployen, vorherige abbrechen
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Tests laufen parallel, blockieren Deploy NICHT
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Test-Fehler blockieren NICHT den Deploy (Solo-Dev, manuelle QA)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npx eslint --max-warnings 200 || echo "::warning::Lint hat Fehler"

      - name: Unit Tests (Vitest)
        run: npm run test || echo "::warning::Tests fehlgeschlagen — Deploy laeuft trotzdem"

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # KEIN needs: test — Deploy laeuft IMMER bei Push auf master
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Deployment Summary
        run: |
          echo "## Deployment erfolgreich" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://nachbar-io.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "- **Preview:** ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** master" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
