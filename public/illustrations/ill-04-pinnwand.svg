  <circle cx="200" cy="85" r="0.7" fill="#2D3142" fill-opacity="0.04" stroke="none"/>
  <circle cx="160" cy="155" r="0.9" fill="#2D3142" fill-opacity="0.05" stroke="none"/>
  <circle cx="260" cy="145" r="1.1" fill="#2D3142" fill-opacity="0.06" stroke="none"/>

  <!-- Notiz 1 (gross, gelb, schraeg) -->
  <rect x="95" y="32" width="72" height="55" rx="2" stroke="#F59E0B" stroke-width="1.2" fill="#F59E0B" fill-opacity="0.04" transform="rotate(-4 131 59)"/>
