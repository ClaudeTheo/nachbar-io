  <rect x="210" y="28" width="65" height="58" rx="2" stroke="#3B82F6" stroke-width="1.2" fill="#3B82F6" fill-opacity="0.04" transform="rotate(3 242 57)"/>
  <line x1="220" y1="45" x2="265" y2="46" stroke="#2D3142" stroke-width="0.7" opacity="0.3"/>
  <line x1="220" y1="53" x2="260" y2="54" stroke="#2D3142" stroke-width="0.6" opacity="0.25"/>
  <line x1="220" y1="61" x2="255" y2="62" stroke="#2D3142" stroke-width="0.6" opacity="0.25"/>
  <line x1="220" y1="69" x2="245" y2="70" stroke="#2D3142" stroke-width="0.5" opacity="0.2"/>
