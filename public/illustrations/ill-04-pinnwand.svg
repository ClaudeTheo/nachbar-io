  <line x1="105" y1="48" x2="155" y2="47" stroke="#2D3142" stroke-width="0.7" opacity="0.3"/>
  <line x1="105" y1="56" x2="150" y2="55" stroke="#2D3142" stroke-width="0.6" opacity="0.25"/>
  <line x1="105" y1="64" x2="145" y2="63" stroke="#2D3142" stroke-width="0.6" opacity="0.25"/>
  <line x1="105" y1="72" x2="135" y2="71" stroke="#2D3142" stroke-width="0.5" opacity="0.2"/>
  <!-- Pin -->
  <circle cx="131" cy="32" r="4.5" fill="#EF4444" fill-opacity="0.15" stroke="#EF4444" stroke-width="1.2"/>
  <circle cx="131" cy="32" r="1.5" fill="#EF4444" fill-opacity="0.4" stroke="none"/>

