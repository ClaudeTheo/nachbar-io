name: Deploy to Vercel Production

on:
  # Manueller Trigger — kein Auto-Schedule (Founder-Decision 2026-04-29)
  workflow_dispatch:

# Parallele Runs verhindern
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Schritt 1: Manueller Trigger ist die Deploy-Freigabe
  check:
    name: Check for changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Allow manual deployment
        id: check
        run: echo "should_deploy=true" >> $GITHUB_OUTPUT

  # Schritt 2: Tests (parallel zum Deploy, blockiert nicht)
  test:
    name: Lint & Test
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npx eslint --max-warnings 200

      - name: Unit Tests (Vitest)
        run: npm run test

      - name: Security Audit (npm audit)
        run: npm audit --audit-level=high --omit=dev || echo "::warning::npm audit hat high/critical Vulnerabilities gefunden"

  # Schritt 3: Build & Deploy (nur nach gruenem Lint + Vitest, manuell ausgeloest)
  deploy:
    name: Build & Deploy
    needs: [check, test]
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Deployment Summary
        run: |
          echo "## Deployment erfolgreich" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://nachbar-io.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "- **Preview:** ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
