  <rect x="100" y="100" width="68" height="50" rx="2" stroke="#8B5CF6" stroke-width="1.2" fill="#8B5CF6" fill-opacity="0.04" transform="rotate(2 134 125)"/>
  <line x1="110" y1="115" x2="158" y2="116" stroke="#2D3142" stroke-width="0.7" opacity="0.3"/>
  <line x1="110" y1="123" x2="155" y2="124" stroke="#2D3142" stroke-width="0.6" opacity="0.25"/>
  <line x1="110" y1="131" x2="148" y2="132" stroke="#2D3142" stroke-width="0.6" opacity="0.25"/>
