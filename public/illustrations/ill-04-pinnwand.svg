  <circle cx="242" cy="28" r="4.5" fill="#4CAF87" fill-opacity="0.15" stroke="#4CAF87" stroke-width="1.2"/>
  <circle cx="242" cy="28" r="1.5" fill="#4CAF87" fill-opacity="0.4" stroke="none"/>

