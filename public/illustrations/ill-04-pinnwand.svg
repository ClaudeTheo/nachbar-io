  <circle cx="150" cy="140" r="5" stroke="#8B5CF6" stroke-width="0.6" opacity="0.3"/>
  <circle cx="148" cy="139" r="0.7" fill="#2D3142" fill-opacity="0.3" stroke="none"/>
  <circle cx="152" cy="139" r="0.7" fill="#2D3142" fill-opacity="0.3" stroke="none"/>
  <path d="M148 142 Q150 144 152 142" stroke="#2D3142" stroke-width="0.4" opacity="0.3"/>
  <!-- Pin -->
  <circle cx="134" cy="100" r="4.5" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.2"/>
  <circle cx="134" cy="100" r="1.5" fill="#F59E0B" fill-opacity="0.4" stroke="none"/>

  <!-- Notiz 4 (gruen, rechts unten) -->
  <rect x="215" y="102" width="60" height="48" rx="2" stroke="#4CAF87" stroke-width="1.2" fill="#4CAF87" fill-opacity="0.04" transform="rotate(-2 245 126)"/>
  <!-- Haekchen-Liste -->
  <path d="M225 118 L228 121 L233 114" stroke="#4CAF87" stroke-width="0.8" opacity="0.5"/>
  <line x1="238" y1="118" x2="265" y2="118" stroke="#2D3142" stroke-width="0.6" opacity="0.25"/>
  <path d="M225 130 L228 133 L233 126" stroke="#4CAF87" stroke-width="0.8" opacity="0.5"/>
  <line x1="238" y1="130" x2="262" y2="130" stroke="#2D3142" stroke-width="0.6" opacity="0.25"/>
  <rect x="225" y="138" width="8" height="8" rx="1" stroke="#2D3142" stroke-width="0.5" opacity="0.2"/>
  <line x1="238" y1="142" x2="258" y2="142" stroke="#2D3142" stroke-width="0.5" opacity="0.2"/>
  <!-- Pin -->
  <circle cx="245" cy="102" r="4.5" fill="#EF4444" fill-opacity="0.15" stroke="#EF4444" stroke-width="1.2"/>
  <circle cx="245" cy="102" r="1.5" fill="#EF4444" fill-opacity="0.4" stroke="none"/>

  <!-- Foto angeheftet (Polaroid-Stil) -->
  <rect x="175" y="95" width="30" height="35" rx="1" stroke="#2D3142" stroke-width="0.8" opacity="0.35" fill="white" fill-opacity="0.3" transform="rotate(8 190 112)"/>
  <rect x="178" y="98" width="24" height="22" rx="0.5" stroke="#2D3142" stroke-width="0.5" opacity="0.2" transform="rotate(8 190 109)"/>
  <!-- Berg-Motiv im Foto -->
  <path d="M180 116 L188 104 L192 110 L198 102 L202 116Z" stroke="#4CAF87" stroke-width="0.4" opacity="0.2" transform="rotate(8 190 109)"/>
  <!-- Pin -->
  <circle cx="190" cy="95" r="3.5" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
  <circle cx="190" cy="95" r="1.2" fill="#3B82F6" fill-opacity="0.4" stroke="none"/>

  <!-- Washi-Tape oben -->
  <rect x="155" y="25" width="35" height="8" rx="1" fill="#4CAF87" fill-opacity="0.08" stroke="#4CAF87" stroke-width="0.5" opacity="0.3" transform="rotate(-2 172 29)"/>

  <!-- Bueroklammer -->
  <path d="M285 55 L285 45 Q285 40 290 40 Q295 40 295 45 L295 65 Q295 70 290 70 Q285 70 285 65 L285 58" stroke="#2D3142" stroke-width="0.8" opacity="0.3"/>

  <!-- Aufhaengung oben -->
  <circle cx="200" cy="12" r="3" stroke="#2D3142" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="15" x2="200" y2="18" stroke="#2D3142" stroke-width="0.8" opacity="0.3"/>

  <!-- Schatten unter Pinnwand -->
  <ellipse cx="200" cy="186" rx="110" ry="3" fill="#2D3142" fill-opacity="0.06" stroke="none"/>
</svg>