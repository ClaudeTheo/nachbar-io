name: E2E Multi-Agent Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Manueller Trigger
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  E2E_CLEANUP: "true"

jobs:
  e2e-smoke:
    name: Smoke Tests (S7)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nachbar-io/package-lock.json

      - name: Install dependencies
        working-directory: nachbar-io
        run: npm ci

      - name: Install Playwright browsers
        working-directory: nachbar-io
        run: npx playwright install --with-deps chromium

      - name: Build application
        working-directory: nachbar-io
        run: npm run build

      - name: Run Smoke Tests
        working-directory: nachbar-io
        run: npx playwright test --config=tests/e2e/playwright.config.ts --project=smoke

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: |
            nachbar-io/playwright-report/
            nachbar-io/test-results/
          retention-days: 14

  e2e-multi-agent:
    name: Multi-Agent Tests (S1-S6)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: e2e-smoke
    # Nur wenn Supabase-Secrets vorhanden sind
    if: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nachbar-io/package-lock.json

      - name: Install dependencies
        working-directory: nachbar-io
        run: npm ci

      - name: Install Playwright browsers
        working-directory: nachbar-io
        run: npx playwright install --with-deps chromium

      - name: Build application
        working-directory: nachbar-io
        run: npm run build

      - name: Run Multi-Agent Tests
        working-directory: nachbar-io
        run: npx playwright test --config=tests/e2e/playwright.config.ts --project=multi-agent --project=senior-terminal

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multi-agent-test-report
          path: |
            nachbar-io/playwright-report/
            nachbar-io/test-results/
          retention-days: 14

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: nachbar-io/test-results/junit.xml
          retention-days: 14
