  <rect x="84" y="22" width="232" height="156" rx="2" stroke="#2D3142" stroke-width="0.5" opacity="0.2"/>
  <!-- Kork-Textur -->
  <circle cx="120" cy="55" r="1" fill="#2D3142" fill-opacity="0.06" stroke="none"/>
